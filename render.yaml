# Render Blueprint — CLA Learning (Next.js + Supabase)
# Deploy: Dashboard → New → Blueprint → connect repo with this file
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cla-learning
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://cla-learning.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # Runtime vars (preferred — work without rebuild after env changes)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
